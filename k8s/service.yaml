apiVersion: v1
kind: Service
metadata:
  name: azure-messaging-api
  labels:
    app: azure-messaging-api
spec:
  # LoadBalancer on Docker Desktop maps the service to localhost.
  # On AKS this would provision a real cloud LB with a public IP.
  type: LoadBalancer
  selector:
    app: azure-messaging-api
  ports:
    - name: http
      port: 80
      targetPort: http
