apiVersion: v1
kind: ConfigMap
metadata:
  name: azure-messaging-api-config
  labels:
    app: azure-messaging-api
data:
  ASPNETCORE_ENVIRONMENT: "Development"
  # Pods inside Docker Desktop's Kubernetes reach emulators running in docker-compose
  # (on the host) via the host.docker.internal DNS alias.
  CosmosDb__ConnectionString: "AccountEndpoint=https://host.docker.internal:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw=="
  CosmosDb__DatabaseName: "messaging-db"
  CosmosDb__ContainerName: "messages"
  # Opt-in bypass: emulator cert is issued for CN=localhost, pods connect via host.docker.internal
  CosmosDb__TrustEmulatorCert: "true"
  ServiceBus__ConnectionString: "Endpoint=sb://host.docker.internal;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
  ServiceBus__QueueName: "messages"
